<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Slide 2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;user-select:none}
h1{font-size:clamp(22px,6vw,36px);color:#f97316;letter-spacing:2px;margin-bottom:8px}
#ui{display:flex;gap:16px;margin-bottom:12px;font-size:14px}
#ui div{background:#0f1120;border:1px solid #1e2340;border-radius:12px;padding:6px 18px;text-align:center}
.lbl{color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.val{color:#e2e8f0;font-size:20px;font-weight:bold}
#board{background:#1e2340;border-radius:10px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;touch-action:none}
.cell{width:clamp(62px,18vw,80px);height:clamp(62px,18vw,80px);background:#0f1120;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:clamp(14px,4vw,22px);transition:background .12s,color .12s}
#msg{margin-top:14px;font-size:20px;font-weight:bold;min-height:32px;color:#22c55e}
#hint{margin-top:6px;color:#475569;font-size:13px}
button{margin-top:12px;background:#7c3aed;border:none;color:#fff;padding:10px 30px;border-radius:10px;font-size:16px;cursor:pointer}
button:hover{background:#6d28d9}
</style>
</head>
<body>
<h1>2048</h1>
<div id="ui">
  <div><div class="lbl">Score</div><div class="val" id="sc">0</div></div>
  <div><div class="lbl">Best</div><div class="val" id="hi">0</div></div>
</div>
<div id="board"></div>
<div id="msg"></div>
<div id="hint">Arrow keys or swipe to move</div>
<button id="newBtn">New Game</button>

<script>
const COLORS = {
  0:    ['#0f1120','#0f1120'],
  2:    ['#fef9c3','#1a1400'],
  4:    ['#fde68a','#1a1000'],
  8:    ['#fed7aa','#4a1a00'],
  16:   ['#fca5a5','#4a0000'],
  32:   ['#f87171','#fff'],
  64:   ['#ef4444','#fff'],
  128:  ['#fb923c','#fff'],
  256:  ['#f97316','#fff'],
  512:  ['#eab308','#fff'],
  1024: ['#22c55e','#fff'],
  2048: ['#3b82f6','#fff'],
};

const board = document.getElementById('board');
const scEl = document.getElementById('sc');
const hiEl = document.getElementById('hi');
const msgEl = document.getElementById('msg');

let grid, score, best = 0, won = false, over = false;
let cells = [];

function init() {
  grid = Array.from({length:4}, () => Array(4).fill(0));
  score = 0; won = false; over = false;
  scEl.textContent = 0;
  msgEl.textContent = '';
  board.innerHTML = '';
  cells = [];
  for (let r = 0; r < 4; r++) {
    cells[r] = [];
    for (let c = 0; c < 4; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      board.appendChild(el);
      cells[r][c] = el;
    }
  }
  addTile(); addTile();
  render();
}

function addTile() {
  const empty = [];
  for (let r=0;r<4;r++) for(let c=0;c<4;c++) if(!grid[r][c]) empty.push([r,c]);
  if (!empty.length) return false;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  return true;
}

function render() {
  for (let r=0;r<4;r++) for(let c=0;c<4;c++) {
    const v = grid[r][c];
    const el = cells[r][c];
    el.textContent = v || '';
    const [bg, fg] = COLORS[v] || ['#7c3aed','#fff'];
    el.style.background = bg;
    el.style.color = fg;
  }
  scEl.textContent = score;
  if (score > best) { best = score; hiEl.textContent = best; }
}

function slide(row) {
  const r = row.filter(x => x);
  const merged = [];
  let changed = row.some(x => x) && r.length < row.filter(x=>x).length;
  for (let i=0;i<r.length-1;i++) {
    if (r[i] === r[i+1]) {
      r[i] *= 2;
      score += r[i];
      if (r[i] === 2048 && !won) { won=true; msgEl.textContent='🎉 You reached 2048!'; }
      r.splice(i+1,1);
      changed = true;
    }
  }
  while (r.length < 4) r.push(0);
  return { row: r, changed: changed || row.some((v,i) => v !== r[i]) };
}

function move(dir) {
  if (over) return;
  let changed = false;
  if (dir === 'left') {
    for (let r=0;r<4;r++) { const {row,changed:c} = slide(grid[r]); grid[r]=row; if(c) changed=true; }
  } else if (dir === 'right') {
    for (let r=0;r<4;r++) { const {row,changed:c} = slide([...grid[r]].reverse()); grid[r]=row.reverse(); if(c) changed=true; }
  } else if (dir === 'up') {
    for (let c=0;c<4;c++) {
      const col = grid.map(r=>r[c]);
      const {row,changed:ch} = slide(col);
      row.forEach((v,r) => grid[r][c]=v);
      if(ch) changed=true;
    }
  } else if (dir === 'down') {
    for (let c=0;c<4;c++) {
      const col = grid.map(r=>r[c]).reverse();
      const {row,changed:ch} = slide(col);
      row.reverse().forEach((v,r) => grid[r][c]=v);
      if(ch) changed=true;
    }
  }
  if (changed) {
    addTile();
    render();
    if (!canMove()) { over=true; msgEl.textContent=`Game Over! Score: ${score}`; }
  }
}

function canMove() {
  for (let r=0;r<4;r++) for(let c=0;c<4;c++) {
    if (!grid[r][c]) return true;
    if (c<3 && grid[r][c]===grid[r][c+1]) return true;
    if (r<3 && grid[r][c]===grid[r+1][c]) return true;
  }
  return false;
}

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',a:'left',d:'right',w:'up',s:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let tx=0,ty=0;
board.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
board.addEventListener('touchend', e => {
  e.preventDefault();
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)<20&&Math.abs(dy)<20) return;
  if (Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
}, {passive:false});

document.getElementById('newBtn').addEventListener('click', init);
init();
</script>
</body>
</html>
