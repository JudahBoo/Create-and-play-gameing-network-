<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:,">
<title>Road Dash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080f;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;overflow:hidden;user-select:none}
canvas{border-radius:8px;box-shadow:0 0 40px rgba(251,146,60,.25)}
#hint{color:#475569;font-size:13px;margin-top:10px;letter-spacing:.3px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">SPACE / TAP to jump &nbsp;·&nbsp; Double jump allowed!</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=600,H=260,GROUND=H-55;
c.width=W; c.height=H;

// ── Player ──
let player,obstacles,clouds,score,hiScore=0,speed,frame,state,particles;

const P_W=36,P_H=46,P_X=90;
const GRAVITY=0.65, JUMP=-13.5;

function initPlayer(){
  return {y:GROUND-P_H,vy:0,jumps:0,dead:false,runFrame:0,dust:[]};
}

function init(){
  player=initPlayer();
  obstacles=[]; clouds=mkClouds(); score=0; speed=5; frame=0; particles=[];
  state='start';
}

function mkClouds(){
  return Array.from({length:5},(_,i)=>({x:i*150+100,y:20+Math.random()*60,w:70+Math.random()*40,s:.6+Math.random()*.5}));
}

// ── Input ──
function jump(){
  if(state!=='play')return;
  if(player.jumps<2){player.vy=JUMP-player.jumps*1;player.jumps++;spawnParticles(player.x,player.y+P_H,'#f97316');}
}
function doAction(){
  if(state==='start'||state==='over'){init();state='play';return;}
  jump();
}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();doAction();}});
c.addEventListener('click',doAction);
c.addEventListener('touchstart',e=>{e.preventDefault();doAction();},{passive:false});

// ── Obstacles ──
const OBST_TYPES=[
  {w:20,h:40,color:'#f87171',name:'cactus'},
  {w:30,h:25,color:'#a78bfa',name:'rock'},
  {w:50,h:22,color:'#60a5fa',name:'bird',yOff:-80},
  {w:18,h:55,color:'#4ade80',name:'tall'},
];

function spawnObstacle(){
  const t=OBST_TYPES[Math.floor(Math.random()*OBST_TYPES.length)];
  const yo=t.yOff||0;
  obstacles.push({x:W+10,y:GROUND-t.h+yo,w:t.w,h:t.h,color:t.color,type:t.name});
}

// ── Particles ──
function spawnParticles(x,y,col){
  for(let i=0;i<7;i++) particles.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*3,life:1,col});
}

// ── Update ──
function update(){
  if(state!=='play')return;
  frame++;
  score+=speed*.02;
  speed=5+Math.min(score*.008,8);

  // Player physics
  player.vy+=GRAVITY; player.y+=player.vy;
  if(player.y>=GROUND-P_H){player.y=GROUND-P_H;player.vy=0;player.jumps=0;}
  if(!player.dead)player.runFrame++;

  // Dust (when on ground)
  if(player.jumps===0&&frame%8===0) player.dust.push({x:P_X+5,y:GROUND,life:1});
  player.dust=player.dust.map(d=>({...d,life:d.life-.08})).filter(d=>d.life>0);

  // Spawn obstacles
  const minGap=Math.max(55,80-score*.05);
  if(frame%Math.floor(minGap)===0&&Math.random()<0.9) spawnObstacle();

  // Move obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    obstacles[i].x-=speed;
    if(obstacles[i].x+obstacles[i].w<0){obstacles.splice(i,1);continue;}
    // Collision
    if(!player.dead&&
      P_X+P_W-8>obstacles[i].x+4&&P_X+8<obstacles[i].x+obstacles[i].w-4&&
      player.y+P_H-8>obstacles[i].y+4&&player.y+4<obstacles[i].y+obstacles[i].h-4){
      player.dead=true;if(score>hiScore)hiScore=Math.floor(score);
      spawnParticles(P_X+P_W/2,player.y+P_H/2,'#ef4444');
      setTimeout(()=>{state='over';},600);
    }
  }

  // Clouds
  clouds.forEach(cl=>{cl.x-=cl.s;if(cl.x+cl.w<0)cl.x=W+cl.w;});

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.04;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ── Draw ──
function drawBg(){
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,GROUND);
  g.addColorStop(0,state==='over'?'#1a0a0a':'#0f172a');
  g.addColorStop(1,state==='over'?'#2a1010':'#1e3a5f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND);

  // Clouds
  ctx.fillStyle='rgba(255,255,255,0.06)';
  clouds.forEach(cl=>{ctx.beginPath();ctx.ellipse(cl.x,cl.y,cl.w/2,16,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cl.x-cl.w*.25,cl.y+6,cl.w*.3,11,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cl.x+cl.w*.25,cl.y+8,cl.w*.25,10,0,0,Math.PI*2);ctx.fill();
  });

  // Ground
  ctx.fillStyle='#1e293b'; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.fillStyle='#334155'; ctx.fillRect(0,GROUND,W,8);
  // Road lines
  ctx.fillStyle='rgba(255,255,255,0.15)';
  for(let i=0;i<8;i++){const rx=(i*100-frame*speed*.6)%W;ctx.fillRect(rx<0?rx+W:rx,GROUND+2,40,4);}
}

function drawPlayer(){
  const x=P_X,y=player.y;
  const onGround=player.jumps===0;
  const t=Math.floor(player.runFrame/8)%4;

  if(player.dead&&frame%6<3)return;

  // Body
  ctx.shadowColor='#f97316'; ctx.shadowBlur=10;
  // Cape
  ctx.fillStyle='#dc2626';
  ctx.beginPath();ctx.moveTo(x+8,y+10);ctx.lineTo(x-8,y+25+Math.sin(player.runFrame*.2)*4);ctx.lineTo(x+8,y+30);ctx.fill();
  // Torso
  ctx.fillStyle='#f97316'; ctx.fillRect(x+4,y+8,P_W-12,P_H-20);
  // Head
  ctx.fillStyle='#fbbf24'; ctx.beginPath(); ctx.arc(x+P_W/2-2,y+10,11,0,Math.PI*2); ctx.fill();
  // Visor
  ctx.fillStyle='#0ea5e9'; ctx.fillRect(x+P_W/2-7,y+5,14,6);
  // Legs (running animation)
  ctx.fillStyle='#1d4ed8';
  if(onGround){
    const la=Math.sin(player.runFrame*.25)*20;
    // Left leg
    ctx.save();ctx.translate(x+12,y+P_H-12);ctx.rotate(la*Math.PI/180);ctx.fillRect(-4,0,8,16);ctx.restore();
    // Right leg
    ctx.save();ctx.translate(x+22,y+P_H-12);ctx.rotate(-la*Math.PI/180);ctx.fillRect(-4,0,8,16);ctx.restore();
    // Feet
    ctx.fillStyle='#1e293b';
    ctx.fillRect(x+5,y+P_H,12,5);ctx.fillRect(x+18,y+P_H,12,5);
  } else {
    ctx.fillRect(x+8,y+P_H-12,P_W-18,14);
    ctx.fillStyle='#1e293b'; ctx.fillRect(x+6,y+P_H,P_W-14,5);
  }
  ctx.shadowBlur=0;
}

function drawObstacle(o){
  ctx.shadowColor=o.color; ctx.shadowBlur=8;
  ctx.fillStyle=o.color;
  if(o.type==='cactus'){
    ctx.fillRect(o.x+6,o.y,8,o.h);
    ctx.fillRect(o.x,o.y+10,o.w,7);
    ctx.fillRect(o.x+3,o.y+6,6,7);
  } else if(o.type==='bird'){
    ctx.beginPath();ctx.ellipse(o.x+o.w/2,o.y+o.h/2,o.w/2,o.h/2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(o.x-8,o.y+3,o.w+16,7);// wings
    ctx.fillStyle='#fbbf24';ctx.fillRect(o.x+o.w-4,o.y+o.h/2-2,8,4);// beak
  } else {
    ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,4);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(o.x+4,o.y+4,o.w-8,4);
  }
  ctx.shadowBlur=0;
}

function loop(){
  update();
  ctx.clearRect(0,0,W,H);
  drawBg();

  // Dust
  player.dust.forEach(d=>{ctx.globalAlpha=d.life*.5;ctx.fillStyle='#94a3b8';ctx.beginPath();ctx.ellipse(d.x,d.y,8,3,0,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;

  obstacles.forEach(drawObstacle);
  drawPlayer();

  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;

  // HUD
  ctx.textAlign='left'; ctx.fillStyle='#94a3b8'; ctx.font='bold 15px sans-serif';
  ctx.fillText('SCORE '+Math.floor(score),12,24);
  ctx.textAlign='right';
  ctx.fillText('BEST '+hiScore,W-12,24);

  // Overlays
  if(state==='start'||state==='over'){
    ctx.fillStyle='rgba(0,0,10,.65)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.shadowColor='#f97316'; ctx.shadowBlur=20;
    ctx.fillStyle='#fb923c'; ctx.font='bold 30px sans-serif';
    ctx.fillText(state==='start'?'🏃 ROAD DASH':'GAME OVER',W/2,H/2-36);
    ctx.shadowBlur=0;
    ctx.fillStyle='#94a3b8'; ctx.font='15px sans-serif';
    if(state==='over'){ctx.fillText('Score: '+Math.floor(score)+'  Best: '+hiScore,W/2,H/2-4);}
    ctx.fillText('Space · Tap · Click to jump',W/2,H/2+30);
    ctx.fillStyle='#475569'; ctx.font='13px sans-serif';
    ctx.fillText('Double jump allowed!  Speed increases over time.',W/2,H/2+56);
  }

  requestAnimationFrame(loop);
}

init(); loop();
</script>
</body>
</html>
