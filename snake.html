<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Snake</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;touch-action:none}
    #hud{display:flex;gap:40px;margin-bottom:16px;color:#fff}
    .hud-item{text-align:center}
    .hud-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45)}
    .hud-val{font-size:28px;font-weight:700;line-height:1}
    #canvas{border-radius:8px;box-shadow:0 0 40px rgba(74,222,128,0.3),0 0 0 1px rgba(74,222,128,0.15)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;backdrop-filter:blur(6px)}
    .overlay h1{font-size:clamp(40px,8vw,72px);font-weight:900;color:#4ade80;text-shadow:0 0 30px rgba(74,222,128,0.6)}
    .overlay p{color:rgba(255,255,255,0.6);font-size:15px;text-align:center;line-height:1.6;max-width:320px}
    .overlay .big{font-size:clamp(60px,12vw,100px);font-weight:900;color:#fff;line-height:1}
    .btn{padding:13px 44px;border-radius:50px;border:none;font-size:17px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#4ade80,#22c55e);color:#111;box-shadow:0 4px 20px rgba(74,222,128,0.4);transition:transform .1s}
    .btn:hover{transform:scale(1.06)}.btn:active{transform:scale(.96)}
    #controls{display:none;grid-template-columns:repeat(3,52px);gap:6px;margin-top:8px}
    @media(pointer:coarse){#controls{display:grid}}
    .dpad{width:52px;height:52px;border-radius:10px;border:none;background:rgba(255,255,255,0.12);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s}
    .dpad:active{background:rgba(255,255,255,0.28)}
    #back-btn{position:fixed;top:14px;left:14px;padding:8px 18px;border-radius:50px;border:none;background:rgba(255,255,255,0.1);color:#fff;font-size:13px;cursor:pointer;z-index:999;text-decoration:none}
  </style>
</head>
<body>
<a href="index.html" id="back-btn">← Games</a>

<div id="hud">
  <div class="hud-item"><div class="hud-label">Score</div><div class="hud-val" id="score">0</div></div>
  <div class="hud-item"><div class="hud-label">Best</div><div class="hud-val" id="best">0</div></div>
  <div class="hud-item"><div class="hud-label">Level</div><div class="hud-val" id="level">1</div></div>
</div>
<canvas id="canvas"></canvas>
<div id="controls">
  <div></div><button class="dpad" id="up">▲</button><div></div>
  <button class="dpad" id="left">◄</button><div></div><button class="dpad" id="right">►</button>
  <div></div><button class="dpad" id="down">▼</button><div></div>
</div>

<!-- Start -->
<div class="overlay" id="start-overlay">
  <h1>Snake</h1>
  <p>Eat the food, grow longer.<br>Don't hit the walls or yourself.<br>Arrow keys or WASD to move.</p>
  <button class="btn" id="start-btn">Play</button>
</div>

<!-- Game Over -->
<div class="overlay" id="gameover-overlay" style="display:none">
  <h1 style="color:#f87171">Game Over</h1>
  <div class="big" id="final-score">0</div>
  <p id="go-msg"></p>
  <button class="btn" id="restart-btn" style="background:linear-gradient(135deg,#f87171,#ef4444)">Play Again</button>
</div>

<script>
(function(){
'use strict';

const COLS=20,ROWS=20,CS=26;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
canvas.width=COLS*CS;
canvas.height=ROWS*CS;

const scoreEl=document.getElementById('score');
const bestEl=document.getElementById('best');
const levelEl=document.getElementById('level');
const startOverlay=document.getElementById('start-overlay');
const gameoverOverlay=document.getElementById('gameover-overlay');
const finalScoreEl=document.getElementById('final-score');
const goMsg=document.getElementById('go-msg');

let snake,dir,nextDir,food,score,best=0,running,animId,lastTime,interval;

const SPEEDS=[150,130,110,95,80,68,56,48,40,34]; // ms per step by level

function cellColor(i,len){
  const t=i/len;
  const r=Math.round(34+(74-34)*t);
  const g=Math.round(197+(222-197)*t);
  const b=Math.round(94+(128-94)*t);
  return`rgb(${r},${g},${b})`;
}

function level(){return Math.min(Math.floor(score/50)+1,10);}
function stepInterval(){return SPEEDS[level()-1];}

function placeFood(){
  const cells=[];
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
    if(!snake.some(s=>s.x===x&&s.y===y))cells.push({x,y});
  }
  food=cells[Math.floor(Math.random()*cells.length)];
}

function startGame(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;
  running=true;
  updateHUD();
  placeFood();
  startOverlay.style.display='none';
  gameoverOverlay.style.display='none';
  lastTime=0;
  if(animId)cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function loop(ts){
  if(!running)return;
  if(!lastTime)lastTime=ts;
  if(ts-lastTime>=stepInterval()){
    lastTime=ts;
    step();
  }
  draw();
  animId=requestAnimationFrame(loop);
}

function step(){
  dir={...nextDir};
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    endGame();return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;
    updateHUD();
    placeFood();
  }else{
    snake.pop();
  }
}

function draw(){
  // bg
  ctx.fillStyle='#0f172a';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid dots
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
    ctx.beginPath();
    ctx.arc(x*CS+CS/2,y*CS+CS/2,1,0,Math.PI*2);
    ctx.fill();
  }

  // food
  const fx=food.x*CS+CS/2,fy=food.y*CS+CS/2,fr=CS/2-3;
  const grd=ctx.createRadialGradient(fx-2,fy-2,1,fx,fy,fr);
  grd.addColorStop(0,'#ff6b6b');grd.addColorStop(1,'#dc2626');
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.arc(fx,fy,fr,0,Math.PI*2);ctx.fill();
  // glow
  ctx.save();ctx.globalAlpha=0.3;
  ctx.shadowColor='#ff6b6b';ctx.shadowBlur=12;
  ctx.fill();ctx.restore();

  // snake
  snake.forEach((seg,i)=>{
    const x=seg.x*CS,y=seg.y*CS,r=4;
    const pad=i===0?1:2;
    const col=cellColor(i,snake.length);
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.roundRect(x+pad,y+pad,CS-pad*2,CS-pad*2,r);
    ctx.fill();
    if(i===0){
      // eyes
      const ex=dir.x,ey=dir.y;
      const eyeOffX=ey!==0?5:0,eyeOffY=ex!==0?5:0;
      const cx=x+CS/2+ex*(CS/4),cy=y+CS/2+ey*(CS/4);
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(cx+eyeOffX,cy-eyeOffY,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx-eyeOffX,cy+eyeOffY,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath();ctx.arc(cx+eyeOffX+ex,cy-eyeOffY+ey,1.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(cx-eyeOffX+ex,cy+eyeOffY+ey,1.2,0,Math.PI*2);ctx.fill();
    }
  });
}

function updateHUD(){
  scoreEl.textContent=score;
  if(score>best){best=score;bestEl.textContent=best;}
  levelEl.textContent=level();
}

function endGame(){
  running=false;
  cancelAnimationFrame(animId);
  if(score>best){best=score;bestEl.textContent=best;}
  finalScoreEl.textContent=score;
  goMsg.textContent=score>=200?'Incredible! 🐍':score>=100?'Nice run!':'Keep practicing!';
  gameoverOverlay.style.display='flex';
}

// Controls
const DIRS={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
            w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
            W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};

document.addEventListener('keydown',e=>{
  const d=DIRS[e.key];
  if(d&&!(d.x===-dir.x&&dir.x!==0)&&!(d.y===-dir.y&&dir.y!==0)){
    nextDir=d;
    e.preventDefault();
  }
  if((e.key===' '||e.key==='Enter')&&!running)startGame();
});

// Touch swipe
let t0;
document.addEventListener('touchstart',e=>{t0=e.touches[0];},{passive:true});
document.addEventListener('touchend',e=>{
  if(!t0)return;
  const dx=e.changedTouches[0].clientX-t0.clientX;
  const dy=e.changedTouches[0].clientY-t0.clientY;
  if(Math.abs(dx)>Math.abs(dy)){
    const d=dx>0?{x:1,y:0}:{x:-1,y:0};
    if(!(d.x===-dir.x))nextDir=d;
  }else{
    const d=dy>0?{x:0,y:1}:{x:0,y:-1};
    if(!(d.y===-dir.y))nextDir=d;
  }
},{passive:true});

// D-pad
document.getElementById('up').addEventListener('pointerdown',()=>{if(dir.y!==1)nextDir={x:0,y:-1};});
document.getElementById('down').addEventListener('pointerdown',()=>{if(dir.y!==-1)nextDir={x:0,y:1};});
document.getElementById('left').addEventListener('pointerdown',()=>{if(dir.x!==1)nextDir={x:-1,y:0};});
document.getElementById('right').addEventListener('pointerdown',()=>{if(dir.x!==-1)nextDir={x:1,y:0};});

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);

// initial draw
ctx.fillStyle='#0f172a';ctx.fillRect(0,0,canvas.width,canvas.height);
})();
</script>
</body>
</html>
